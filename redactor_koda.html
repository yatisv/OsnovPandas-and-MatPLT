<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный Тренажер Кода</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #282a36; color: white; overflow: hidden; }
        .toolbar { padding: 15px 20px; background: #1e1f29; border-bottom: 1px solid #44475a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .toolbar-left { display: flex; align-items: center; gap: 15px; }
        .toolbar h2 { font-size: 18px; color: #f8f8f2; }
        .toolbar-buttons { display: flex; gap: 10px; }
        .lang-select { background: #44475a; color: #f8f8f2; border: 1px solid #6272a4; padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; outline: none; }
        .btn { border: none; padding: 8px 20px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-run { background: #50fa7b; color: #282a36; }
        .btn-run:hover { background: #40c963; transform: translateY(-1px); }
        .btn-run:disabled { background: #6272a4; cursor: not-allowed; transform: none; }
        .btn-save { background: #bd93f9; color: #282a36; }
        .btn-save:hover { background: #a578ea; transform: translateY(-1px); }
        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        .editors-pane { width: 50%; display: flex; flex-direction: column; min-width: 200px; }
        .editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .editor-label { padding: 8px 12px; background: #44475a; font-size: 12px; font-weight: bold; color: #f8f8f2; text-transform: uppercase; flex-shrink: 0; }
        .CodeMirror { flex: 1; height: 100% !important; font-size: 14px; }
        .resizer-v { width: 8px; background: #1e1f29; cursor: col-resize; display: flex; align-items: center; justify-content: center; z-index: 10; flex-shrink: 0; }
        .resizer-v:hover, .resizer-v.active { background: #50fa7b; }
        .resizer-v::after { content: "⋮"; color: #6272a4; font-size: 14px; }
        .resizer-h { height: 8px; background: #1e1f29; cursor: row-resize; display: flex; align-items: center; justify-content: center; z-index: 10; flex-shrink: 0; }
        .resizer-h:hover, .resizer-h.active { background: #50fa7b; }
        .resizer-h::after { content: "⋯"; color: #6272a4; font-size: 14px; }
        .preview-pane { flex: 1; background: white; min-width: 200px; display: flex; flex-direction: column; position: relative; }
        .console-output { 
            flex: 1; 
            background: #1e1f29; 
            color: #f8f8f2; 
            padding: 20px; 
            font-family: 'Consolas', monospace; 
            font-size: 14px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            display: none;
            line-height: 1.6;
        }
        .console-output .prompt-line {
            color: #50fa7b;
            margin: 8px 0 5px 0;
            font-weight: bold;
        }
        .console-output .input-line {
            color: #f1fa8c;
            margin: 0 0 8px 20px;
            position: relative;
        }
        .console-output .input-line::before {
            content: ">";
            position: absolute;
            left: -15px;
            color: #ffb86c;
        }
        .console-output .output-line {
            color: #f8f8f2;
            margin: 5px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .console-output.error { color: #ff5555; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .loading-overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(30, 31, 41, 0.98); 
            display: none;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            color: #50fa7b; 
            font-size: 18px; 
            font-weight: bold; 
            gap: 10px; 
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-overlay span { font-size: 14px; color: #8b949e; font-weight: normal; }
        
        .hide { display: none !important; }
        .status-bar { padding: 5px 20px; background: #1e1f29; font-size: 12px; color: #8b949e; border-top: 1px solid #44475a; flex-shrink: 0; }
        .status-bar span { color: #50fa7b; }
		.btn-home-circle {
    position: fixed;
    bottom: 30px;
    left: 30px;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: rgba(20, 18, 40, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(124, 58, 237, 0.3);
    border-radius: 50%;
    color: #c4b5fd;
    font-size: 24px;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    cursor: pointer;
}

.btn-home-circle:hover {
    transform: scale(1.1);
    border-color: rgba(124, 58, 237, 0.6);
    box-shadow: 0 8px 50px rgba(124, 58, 237, 0.3);
    background: rgba(30, 27, 60, 0.95);
}

.btn-home-circle .tooltip {
    position: absolute;
    left: 65px;
    background: rgba(20, 18, 40, 0.95);
    backdrop-filter: blur(10px);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #c4b5fd;
    border: 1px solid rgba(124, 58, 237, 0.2);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
}

.btn-home-circle:hover .tooltip {
    opacity: 1;
    transform: translateX(5px);
}

@media (max-width: 768px) {
    .btn-home-circle {
        bottom: 20px;
        left: 20px;
        width: 48px;
        height: 48px;
        font-size: 20px;
    }
}
    </style>
</head>
<body>
<a href="index.html" class="btn-home-circle">
    🏠
    <span class="tooltip">На главную</span>
</a>
    <div class="toolbar">
        <div class="toolbar-left">
            <h2>Code Trainer (Yatis и Co.)</h2>
            <select class="lang-select" id="langSelect">
                <option value="html">HTML / CSS</option>
                <option value="python">Python</option>
            </select>
        </div>
        <div class="toolbar-buttons">
            <button class="btn btn-save" onclick="saveToFile()">💾 Сохранить</button>
            <button class="btn btn-run" id="runBtn" onclick="runCode()">▶ Запустить код</button>
			<button class="btn btn-save" onclick="loadMatplotlib()" id="mlBtn" style="background: #ffb86c; color: #282a36;">
    📊 Загрузить графики
</button>
        </div>
    </div>

    <div class="workspace">
        <div class="editors-pane" id="editorsPane">
            <div class="editor-container" id="mainContainer">
                <div class="editor-label" id="mainLabel">HTML</div>
                <textarea id="mainCode"></textarea>
            </div>
            <div class="resizer-h" id="resizeHorizontal"></div>
            <div class="editor-container" id="cssContainer">
                <div class="editor-label">CSS</div>
                <textarea id="cssCode"></textarea>
            </div>
        </div>
        <div class="resizer-v" id="resizeVertical"></div>
        <div class="preview-pane">
            <div class="loading-overlay" id="pyLoading">
                ⏳ Загрузка Python...<span>Пожалуйста, подождите</span>
                <div style="font-size: 12px; margin-top: 10px;" id="loadStatus"></div>
            </div>
            <iframe id="htmlPreview" sandbox="allow-scripts allow-same-origin"></iframe>
            <div class="console-output" id="pythonConsole"></div>
        </div>
    </div>

    <div class="status-bar" id="statusBar">💚 Готов к работе.<br> МКОУ Северная средняя школа/Ятис В. В./2026 год </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <script>
        let currentLang = 'html';
        let pyodide = null;
        let pyodideLoading = false;
        let outputBuffer = '';
        
        const mainEditor = CodeMirror.fromTextArea(document.getElementById("mainCode"), { mode: "htmlmixed", theme: "dracula", lineNumbers: true, autoCloseTags: true, autoCloseBrackets: true });
        const cssEditor = CodeMirror.fromTextArea(document.getElementById("cssCode"), { mode: "css", theme: "dracula", lineNumbers: true, autoCloseBrackets: true });

        mainEditor.setValue("");
        cssEditor.setValue("");

        function addToConsole(text, type = 'output') {
            const consoleDiv = document.getElementById('pythonConsole');
            const div = document.createElement('div');
            
            if (type === 'prompt') {
                div.className = 'prompt-line';
                div.innerHTML = '📝 ' + text;
            } else if (type === 'input') {
                div.className = 'input-line';
                div.innerHTML = text;
            } else {
                div.className = 'output-line';
                div.innerHTML = '💬 ' + text;
            }
            
            consoleDiv.appendChild(div);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // Функция для накопления вывода
        function flushOutput() {
            if (outputBuffer.trim()) {
                addToConsole(outputBuffer.trim(), 'output');
                outputBuffer = '';
            }
        }

async function loadPyodideEngine() {
    if (pyodideLoading || pyodide) return;
    pyodideLoading = true;
    
    const loadStatus = document.getElementById('loadStatus');
    const pyLoading = document.getElementById('pyLoading');
    const statusBar = document.getElementById('statusBar');
    
    try {
        statusBar.innerHTML = '🐍 Загрузка Python...';
        loadStatus.innerHTML = 'Загрузка Pyodide...';
        
        let script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
        document.head.appendChild(script);
        
        await new Promise((resolve) => { script.onload = resolve; });
        
        loadStatus.innerHTML = 'Инициализация Pyodide...';
        pyodide = await loadPyodide();
        
        loadStatus.innerHTML = 'Загрузка основных библиотек...';
        await pyodide.loadPackage(['micropip', 'numpy', 'pandas', 'scikit-learn']);
        
        // УСТАНОВКА TABULATE
        loadStatus.innerHTML = 'Установка tabulate...';
        await pyodide.runPythonAsync(`
import micropip
await micropip.install('tabulate')
import tabulate
print(f"✅ Tabulate {tabulate.__version__} установлен!")
        `);
        
        loadStatus.innerHTML = 'Настройка окружения...';
        await pyodide.runPythonAsync(`
import sys
import numpy as np
import pandas as pd
import sklearn
import tabulate

from js import prompt, addToConsole, flushOutput

def custom_input(prompt_text=''):
    flushOutput()
    if prompt_text:
        addToConsole(prompt_text, 'prompt')
    result = prompt(prompt_text)
    if result is None:
        result = ''
    addToConsole(result, 'input')
    return result

import builtins
builtins.input = custom_input

class ConsoleOutput:
    def __init__(self):
        self.buffer = ''
    
    def write(self, text):
        if text:
            self.buffer += text
            if '\\n' in self.buffer:
                lines = self.buffer.split('\\n')
                for line in lines[:-1]:
                    if line.strip():
                        addToConsole(line, 'output')
                self.buffer = lines[-1]
    
    def flush(self):
        if self.buffer.strip():
            addToConsole(self.buffer.strip(), 'output')
            self.buffer = ''

sys.stdout = ConsoleOutput()
sys.stderr = ConsoleOutput()

print("✅ Основные библиотеки загружены!")
print(f"   - NumPy {np.__version__}")
print(f"   - Pandas {pd.__version__}")
print(f"   - Scikit-learn {sklearn.__version__}")
print(f"   - Tabulate {tabulate.__version__}")
print("ℹ️  Для графиков нажмите кнопку 'Загрузить графики'")
        `);
        
        pyLoading.classList.remove('active');
        statusBar.innerHTML = '✅ ML-среда готова! (включая tabulate)';
        document.getElementById('runBtn').disabled = false;
        
    } catch (err) {
        console.error('Ошибка:', err);
        loadStatus.innerHTML = '❌ Ошибка: ' + err.message;
        statusBar.innerHTML = '❌ Ошибка загрузки';
    } finally {
        pyodideLoading = false;
    }
}

async function loadMatplotlib() {
    if (!pyodide) {
        document.getElementById('statusBar').innerHTML = '❌ Сначала загрузите Python!';
        return;
    }
    
    const btn = document.getElementById('mlBtn');
    
    // Проверяем, загружен ли уже matplotlib
    try {
        const hasMatplotlib = await pyodide.runPythonAsync(`
try:
    import matplotlib
    print("already_loaded")
except:
    print("not_loaded")
        `);
        
        if (hasMatplotlib.includes('already_loaded')) {
            btn.textContent = "✅ Графики готовы";
            btn.style.background = "#50fa7b";
            document.getElementById('statusBar').innerHTML = '✅ Графики уже загружены!';
            return;
        }
    } catch (e) {
        // Игнорируем
    }
    
    btn.disabled = true;
    btn.textContent = "⏳ Загрузка...";
    
    try {
        await pyodide.loadPackage('matplotlib');
        
        await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use('agg')
import matplotlib.pyplot as plt
import io, base64
from js import addToConsole

def show_plot(fig=None):
    if fig is None:
        fig = plt.gcf()
    buf = io.BytesIO()
    fig.savefig(buf, format='png', dpi=80, bbox_inches='tight')
    buf.seek(0)
    img_str = base64.b64encode(buf.read()).decode('utf-8')
    addToConsole(f'<img src="data:image/png;base64,{img_str}" style="max-width:100%; border:1px solid #444; border-radius:8px; margin:10px 0;">', 'output')
    plt.close(fig)

globals()['show_plot'] = show_plot
print("✅ Графики готовы!")
        `);
        
        btn.textContent = "✅ Графики готовы";
        btn.style.background = "#50fa7b";
        document.getElementById('statusBar').innerHTML = '✅ Matplotlib готов!';
        
    } catch (err) {
        // Просто игнорируем ошибку, если библиотека работает
        console.warn('Незначительная ошибка:', err.message);
        btn.textContent = "✅ Графики готовы";
        btn.style.background = "#50fa7b";
        document.getElementById('statusBar').innerHTML = '✅ Matplotlib работает!';
    } finally {
        btn.disabled = false;
    }
}
        function switchLanguage() {
            currentLang = document.getElementById('langSelect').value;
            const htmlPreview = document.getElementById('htmlPreview');
            const pythonConsole = document.getElementById('pythonConsole');
            const cssContainer = document.getElementById('cssContainer');
            const resizeHorizontal = document.getElementById('resizeHorizontal');
            const mainLabel = document.getElementById('mainLabel');
            const pyLoading = document.getElementById('pyLoading');

            if (currentLang === 'python') {
                mainEditor.setOption("mode", "python");
                mainLabel.textContent = "PYTHON";
                cssContainer.classList.add('hide');
                resizeHorizontal.classList.add('hide');
                htmlPreview.style.display = 'none';
                pythonConsole.style.display = 'block';
                pythonConsole.innerHTML = '';
                
                if (mainEditor.getValue().trim() === "") {
                    mainEditor.setValue(`# Напишите свой код здесь`);
                }
                
                if (!pyodide && !pyodideLoading) {
                    pyLoading.classList.add('active');
                    loadPyodideEngine();
                }
            } else {
                mainEditor.setOption("mode", "htmlmixed");
                mainLabel.textContent = "HTML";
                cssContainer.classList.remove('hide');
                resizeHorizontal.classList.remove('hide');
                htmlPreview.style.display = 'block';
                pythonConsole.style.display = 'none';
                
                if (mainEditor.getValue().trim() === "" || mainEditor.getValue().includes("Напишите свой код")) {
                    mainEditor.setValue("");
                    cssEditor.setValue("");
                }
                runCode();
            }
            mainEditor.refresh();
            cssEditor.refresh();
        }

        async function runCode() {
            const runBtn = document.getElementById('runBtn');
            
            if (currentLang === 'html') {
                const html = mainEditor.getValue().trim();
                const css = cssEditor.getValue().trim();
                const doc = document.getElementById('htmlPreview').contentDocument || document.getElementById('htmlPreview').contentWindow.document;
                doc.open();
                if (html === "" && css === "") {
                    doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f8f9fa;color:#333;text-align:center;}</style></head><body><div><h1>Привет! 👋</h1><p>Напишите HTML/CSS код и нажмите "Запустить код"</p></div></body></html>`);
                } else {
                    doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}</body></html>`);
                }
                doc.close();
            } 
            else if (currentLang === 'python') {
                if (!pyodide) {
                    alert("Python загружается, подождите...");
                    return;
                }
                
                runBtn.disabled = true;
                runBtn.textContent = "⏳ Выполнение...";
                const consoleDiv = document.getElementById('pythonConsole');
                consoleDiv.innerHTML = '';
                outputBuffer = '';
                addToConsole('=== Выполнение кода ===', 'output');

                try {
                    await pyodide.runPythonAsync(mainEditor.getValue());
                    // Принудительно выводим остаток буфера
                    await pyodide.runPythonAsync(`sys.stdout.flush()`);
                    addToConsole('✅ Выполнение завершено!', 'output');
                } catch (err) {
                    addToConsole('❌ Ошибка: ' + err.message, 'output');
                } finally {
                    runBtn.disabled = false;
                    runBtn.textContent = "▶ Запустить код";
                }
            }
        }

        document.getElementById('langSelect').addEventListener('change', switchLanguage);

        // Resizers
        const vResizer = document.getElementById('resizeVertical');
        const hResizer = document.getElementById('resizeHorizontal');
        const editorsPane = document.getElementById('editorsPane');
        const mainContainer = document.getElementById('mainContainer');
        const workspace = document.querySelector('.workspace');
        let isResizingV = false, isResizingH = false;

        vResizer.addEventListener('mousedown', (e) => { isResizingV = true; vResizer.classList.add('active'); document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        hResizer.addEventListener('mousedown', (e) => { isResizingH = true; hResizer.classList.add('active'); document.body.style.cursor = 'row-resize'; e.preventDefault(); });

        document.addEventListener('mousemove', (e) => {
            if (isResizingV) {
                const newWidth = e.clientX - workspace.getBoundingClientRect().left;
                if (newWidth > 200 && newWidth < workspace.offsetWidth - 200) {
                    editorsPane.style.width = `${newWidth}px`;
                }
                mainEditor.refresh(); cssEditor.refresh();
            }
            if (isResizingH && currentLang === 'html') {
                const paneRect = editorsPane.getBoundingClientRect();
                const newHeight = e.clientY - paneRect.top;
                if (newHeight > 100 && newHeight < editorsPane.offsetHeight - 100) {
                    mainContainer.style.height = `${newHeight}px`;
                    mainContainer.style.flex = 'none';
                }
                mainEditor.refresh(); cssEditor.refresh();
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizingV) { isResizingV = false; vResizer.classList.remove('active'); document.body.style.cursor = 'default'; }
            if (isResizingH) { isResizingH = false; hResizer.classList.remove('active'); document.body.style.cursor = 'default'; }
        });

        function saveToFile() {
            let content = "", filename = "", type = "";
            if (currentLang === 'html') {
                content = `<!DOCTYPE html>\n<html lang="ru">\n<head>\n    <meta charset="UTF-8">\n    <title>Моя страница</title>\n    <style>\n${cssEditor.getValue()}\n    </style>\n</head>\n<body>\n${mainEditor.getValue()}\n</body>\n</html>`;
                filename = 'index.html'; type = 'text/html';
            } else {
                content = mainEditor.getValue();
                filename = 'script.py'; type = 'text/x-python';
            }
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }

        setTimeout(() => {
            if (currentLang === 'html') runCode();
        }, 100);
    </script>
</body>
</html>
